<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Features — PAR Guest360 Beta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0..1,0">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../assets/bento.css">
  <link rel="stylesheet" href="beta.css">
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <a href="index.html" class="header-brand" aria-label="Guest360 Home">
          <img src="../assets/par-guest360.svg" alt="PAR Guest360 logo" width="124" height="40">
        </a>
        <span class="header-brand-divider" aria-hidden="true"></span>
        <button class="header-brand-btn" aria-label="Select brand">
          Life Alive
          <i class="ph ph-caret-down"></i>
        </button>
      </div>
      <div class="header-right">
        <button class="header-btn">
          <img src="../assets/ava-assistant.svg" alt="" width="24" height="24">
          Ava
        </button>
        <button class="header-btn">
          <span class="material-symbols-rounded">school</span>
          PAR Academy
        </button>
        <button class="header-btn header-btn--icon" aria-label="Profile">
          <span class="material-symbols-rounded">person</span>
        </button>
      </div>
    </header>

    <div class="app-shell__body">

      <!-- Sidebar -->
      <aside class="sidebar">
        <nav class="sidebar-nav" aria-label="Main navigation">

          <div class="nav-group" data-nav-group-id="top">
            <a href="index.html" class="nav-item">
              <i class="ph-duotone ph-chart-bar" aria-hidden="true"></i>
              <span class="nav-item__label">Dashboard</span>
            </a>
          </div>

          <div class="nav-group" data-nav-group-id="guests">
            <div class="nav-group-title">Guests</div>
            <a href="guest-profiles.html" class="nav-item">
              <i class="ph-duotone ph-user-circle" aria-hidden="true"></i>
              <span class="nav-item__label">Guest profiles</span>
            </a>
            <a href="guest-segments.html" class="nav-item">
              <i class="ph-duotone ph-users-three" aria-hidden="true"></i>
              <span class="nav-item__label">Segments</span>
            </a>
          </div>

          <div class="nav-group" data-nav-group-id="bottom">
            <a href="settings.html" class="nav-item">
              <i class="ph-duotone ph-gear" aria-hidden="true"></i>
              <span class="nav-item__label">Settings</span>
              <i class="ph-bold ph-caret-right nav-item__chevron" aria-hidden="true"></i>
            </a>
            <!-- Cockpit: open + active because we're on a cockpit page -->
            <button type="button" class="nav-item nav-item-expandable open active" onclick="toggleCockpit(this)" aria-expanded="true">
              <i class="ph-duotone ph-wrench" aria-hidden="true"></i>
              <span class="nav-item__label">Cockpit</span>
              <i class="ph-bold ph-caret-right nav-item__chevron" aria-hidden="true"></i>
            </button>
            <div class="nav-sub-group open" id="cockpit-sub">
              <a href="cockpit-features.html" class="nav-sub-item active">Features</a>
              <a href="cockpit-admins.html" class="nav-sub-item">Admins</a>
            </div>
          </div>

        </nav>
      </aside>

      <!-- Main content -->
      <main class="main-content">
        <div class="content-area content-area--features" id="content-area">

          <!-- Title Bar -->
          <div class="title-bar">
            <div class="title-bar__page-title">
              <h1 class="heading1">Features</h1>
              <div class="title-bar__actions">
                <button class="button transparent">
                  <span class="material-symbols-rounded">help</span>
                  <span>Help</span>
                </button>
              </div>
            </div>
            <div class="title-bar__subtitle">
              <span class="title-bar__subtitle_text">Select the Guest360 features this business can access</span>
            </div>
          </div>

          <!-- Feature checkboxes -->
          <div class="checkbox-group">
            <div class="form-label">
              <label class="form-label__label">Available features</label>
            </div>
            <div class="checkbox-group__options">

              <!-- Feature 1 — checked -->
              <div class="checkbox checkbox__individual checkbox__background" id="cb-f1">
                <input type="checkbox" class="checkbox__input" id="c-f1" checked onchange="onFeatureChange()">
                <label class="checkbox__label" for="c-f1">
                  <span class="checkbox__label_span">
                    <span class="feature-check" aria-hidden="true">

                      <svg class="icon-unchecked" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 21C4.1 21 3.75 20.85 3.45 20.55C3.15 20.25 3 19.9 3 19.5V4.5C3 4.1 3.15 3.75 3.45 3.45C3.75 3.15 4.1 3 4.5 3H19.5C19.9 3 20.25 3.15 20.55 3.45C20.85 3.75 21 4.1 21 4.5V19.5C21 19.9 20.85 20.25 20.55 20.55C20.25 20.85 19.9 21 19.5 21H4.5ZM4.5 19.5H19.5V4.5H4.5V19.5Z" fill="black"/></svg>
                    </span>
                    Feature name

                </label>
              </div>

                      <svg class="icon-unchecked" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 21C4.1 21 3.75 20.85 3.45 20.55C3.15 20.25 3 19.9 3 19.5V4.5C3 4.1 3.15 3.75 3.45 3.45C3.75 3.15 4.1 3 4.5 3H19.5C19.9 3 20.25 3.15 20.55 3.45C20.85 3.75 21 4.1 21 4.5V19.5C21 19.9 20.85 20.25 20.55 20.55C20.25 20.85 19.9 21 19.5 21H4.5ZM4.5 19.5H19.5V4.5H4.5V19.5Z" fill="black"/></svg>
                    </span>
                    Feature name
                  </span>
                </label>
              </div>

              <!-- Feature 3 — unchecked -->
              <div class="checkbox checkbox__individual" id="cb-f3">
                <input type="checkbox" class="checkbox__input" id="c-f3" onchange="onFeatureChange()">
                <label class="checkbox__label" for="c-f3">
                  <span class="checkbox__label_span">
                    <span class="feature-check" aria-hidden="true">
                      <svg class="icon-checked" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="16" height="16" fill="white"/><path d="M4.5 21C4.1 21 3.75 20.85 3.45 20.55C3.15 20.25 3 19.9 3 19.5V4.5C3 4.1 3.15 3.75 3.45 3.45C3.75 3.15 4.1 3 4.5 3H19.5C19.9 3 20.25 3.15 20.55 3.45C20.85 3.75 21 4.1 21 4.5V19.5C21 19.9 20.85 20.25 20.55 20.55C20.25 20.85 19.9 21 19.5 21H4.5ZM10.475 15.675C10.575 15.675 10.6667 15.6583 10.75 15.625C10.8333 15.5917 10.9167 15.5333 11 15.45L17.175 9.275C17.3083 9.14167 17.3792 8.96667 17.3875 8.75C17.3958 8.53333 17.325 8.35 17.175 8.2C17.025 8.05 16.8458 7.975 16.6375 7.975C16.4292 7.975 16.25 8.05 16.1 8.2L10.475 13.825L8.025 11.375C7.89167 11.2417 7.72083 11.1708 7.5125 11.1625C7.30417 11.1542 7.125 11.225 6.975 11.375C6.825 11.525 6.75 11.7042 6.75 11.9125C6.75 12.1208 6.825 12.3 6.975 12.45L9.95 15.45C10.0333 15.5333 10.1167 15.5917 10.2 15.625C10.2833 15.6583 10.375 15.675 10.475 15.675Z" fill="#5A55E3"/></svg>
                      <svg class="icon-unchecked" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 21C4.1 21 3.75 20.85 3.45 20.55C3.15 20.25 3 19.9 3 19.5V4.5C3 4.1 3.15 3.75 3.45 3.45C3.75 3.15 4.1 3 4.5 3H19.5C19.9 3 20.25 3.15 20.55 3.45C20.85 3.75 21 4.1 21 4.5V19.5C21 19.9 20.85 20.25 20.55 20.55C20.25 20.85 19.9 21 19.5 21H4.5ZM4.5 19.5H19.5V4.5H4.5V19.5Z" fill="black"/></svg>
                    </span>
                    Feature name
                  </span>
                </label>
              </div>

              <!-- Feature 4 — unchecked -->
              <div class="checkbox checkbox__individual" id="cb-f4">
                <input type="checkbox" class="checkbox__input" id="c-f4" onchange="onFeatureChange()">
                <label class="checkbox__label" for="c-f4">
                  <span class="checkbox__label_span">
                    <span class="feature-check" aria-hidden="true">
                      <svg class="icon-checked" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="16" height="16" fill="white"/><path d="M4.5 21C4.1 21 3.75 20.85 3.45 20.55C3.15 20.25 3 19.9 3 19.5V4.5C3 4.1 3.15 3.75 3.45 3.45C3.75 3.15 4.1 3 4.5 3H19.5C19.9 3 20.25 3.15 20.55 3.45C20.85 3.75 21 4.1 21 4.5V19.5C21 19.9 20.85 20.25 20.55 20.55C20.25 20.85 19.9 21 19.5 21H4.5ZM10.475 15.675C10.575 15.675 10.6667 15.6583 10.75 15.625C10.8333 15.5917 10.9167 15.5333 11 15.45L17.175 9.275C17.3083 9.14167 17.3792 8.96667 17.3875 8.75C17.3958 8.53333 17.325 8.35 17.175 8.2C17.025 8.05 16.8458 7.975 16.6375 7.975C16.4292 7.975 16.25 8.05 16.1 8.2L10.475 13.825L8.025 11.375C7.89167 11.2417 7.72083 11.1708 7.5125 11.1625C7.30417 11.1542 7.125 11.225 6.975 11.375C6.825 11.525 6.75 11.7042 6.75 11.9125C6.75 12.1208 6.825 12.3 6.975 12.45L9.95 15.45C10.0333 15.5333 10.1167 15.5917 10.2 15.625C10.2833 15.6583 10.375 15.675 10.475 15.675Z" fill="#5A55E3"/></svg>
                      <svg class="icon-unchecked" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 21C4.1 21 3.75 20.85 3.45 20.55C3.15 20.25 3 19.9 3 19.5V4.5C3 4.1 3.15 3.75 3.45 3.45C3.75 3.15 4.1 3 4.5 3H19.5C19.9 3 20.25 3.15 20.55 3.45C20.85 3.75 21 4.1 21 4.5V19.5C21 19.9 20.85 20.25 20.55 20.55C20.25 20.85 19.9 21 19.5 21H4.5ZM4.5 19.5H19.5V4.5H4.5V19.5Z" fill="black"/></svg>
                    </span>
                    Feature name
                  </span>
                </label>
              </div>

            </div>
          </div>

          <!-- Action bar — fixed bottom, shown only when there are unsaved changes -->
          <div class="features-action-bar" id="action-bar" style="display: none;">
            <button class="button primary" onclick="saveChanges()">
              <span>Save</span>
            </button>
            <button class="features-action-bar__cancel" onclick="cancelChanges()">Cancel</button>
          </div>

        </div>

        <!-- Toast — shown after save -->
        <div id="toast" style="
          display: none;
          position: fixed;
          top: 80px;
          left: 50%;
          transform: translateX(-50%);
          z-index: 100;
          min-width: 320px;
        ">
          <div class="toast__body toast__body_success">
            <span class="material-symbols-rounded" style="color:#fff; font-size:20px;">check_circle</span>
            <div style="color:#fff;">
              <div style="font-weight:600; font-size:14px;">Features successfully updated</div>
              <div id="toast-desc" style="font-size:13px; opacity:0.9;"></div>
            </div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script>
    // Track saved state — true = checked
    const saved = [true, true, false, false];
    const cbIds = ['cb-f1', 'cb-f2', 'cb-f3', 'cb-f4'];

    function getCheckedStates() {
      return cbIds.map(id => document.querySelector(`#${id} input`).checked);
    }

    function hasChanges() {
      const current = getCheckedStates();
      return current.some((v, i) => v !== saved[i]);
    }

    function onFeatureChange() {
      cbIds.forEach(id => {
        const div = document.getElementById(id);
        div.classList.toggle('checkbox__background', div.querySelector('input').checked);
      });
      document.getElementById('action-bar').style.display = hasChanges() ? 'flex' : 'none';
    }

    function saveChanges() {
      const current = getCheckedStates();
      current.forEach((v, i) => saved[i] = v);
      document.getElementById('action-bar').style.display = 'none';
      const enabledCount = current.filter(Boolean).length;
      document.getElementById('toast-desc').textContent =
        `Features: ${Array(enabledCount).fill('Feature name').join(', ')}`;
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 4000);
    }

    function cancelChanges() {
      cbIds.forEach((id, i) => {
        const div = document.getElementById(id);
        div.querySelector('input').checked = saved[i];
        div.classList.toggle('checkbox__background', saved[i]);
      });
      document.getElementById('action-bar').style.display = 'none';
    }

    function toggleCockpit(btn) {
      const isOpen = btn.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen);
      document.getElementById('cockpit-sub').classList.toggle('open', isOpen);
    }
  </script>
</body>
</html>
