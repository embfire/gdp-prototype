<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Lab — PAR Guest360 Beta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0..1,0">
  <link rel="stylesheet" href="../assets/bento.css">
  <link rel="stylesheet" href="beta.css">
  <style>
    body { margin: 0; font-family: 'Manrope', system-ui, sans-serif; background: #f5f6f7; color: #000; }
    .lab { display: grid; grid-template-columns: 220px 1fr 380px; height: 100vh; }
    .lab__nav { background: #ffffff; border-right: 1px solid #dfe1e2; overflow-y: auto; }
    .lab__nav-title { padding: 16px 16px 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; color: #6b7280; letter-spacing: 0.04em; }
    .lab__nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: 500; color: #000; user-select: none; }
    .lab__nav-item:hover { background: #f5f6f7; }
    .lab__nav-item.active { background: #eef0fc; color: #5A55E3; font-weight: 600; }
    .lab__nav-item .material-symbols-rounded { font-size: 18px; }
    .lab__main { display: flex; flex-direction: column; min-width: 0; }
    .lab__topbar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #dfe1e2; }
    .lab__topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
    .lab__topbar-spacer { flex: 1; }
    .lab__preset-label { font-size: 13px; color: #555; }
    .lab__select { font-family: inherit; font-size: 13px; padding: 6px 8px; border: 1px solid #dfe1e2; border-radius: 6px; background: #fff; }
    .lab__btn { font-family: inherit; font-size: 13px; padding: 8px 12px; border-radius: 8px; border: none; background: #5A55E3; color: #fff; cursor: pointer; font-weight: 600; }
    .lab__btn:hover { background: #4944c2; }
    .lab__btn--ghost { background: #fff; color: #000; border: 1px solid #dfe1e2; font-weight: 500; }
    .lab__btn--ghost:hover { background: #f5f6f7; }
    .lab__preview { flex: 1; padding: 24px; display: flex; align-items: center; justify-content: center; background: #f5f6f7; overflow: auto; }
    .lab__chart-card { background: #fff; border: 1px solid #dfe1e2; border-radius: 12px; padding: 20px; width: 100%; max-width: 800px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    .lab__chart-host { width: 100%; height: 460px; }
    .lab__controls { background: #fff; border-left: 1px solid #dfe1e2; overflow-y: auto; padding-bottom: 24px; }
    .lab__section { border-bottom: 1px solid #dfe1e2; }
    .lab__section-header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #6b7280; cursor: pointer; user-select: none; background: #fafbfc; }
    .lab__section-header:hover { background: #f3f4f6; }
    .lab__section-body { padding: 12px 16px; display: grid; gap: 10px; }
    .lab__section.collapsed .lab__section-body { display: none; }
    .lab__section-header .caret { margin-left: auto; transition: transform 0.15s; }
    .lab__section.collapsed .caret { transform: rotate(-90deg); }
    .lab__field { display: grid; grid-template-columns: 1fr; gap: 4px; }
    .lab__field--row { grid-template-columns: 130px 1fr; align-items: center; }
    .lab__field label { font-size: 12px; color: #4b5563; font-weight: 500; }
    .lab__field input[type="text"], .lab__field input[type="number"], .lab__field select { font-family: inherit; font-size: 12px; padding: 5px 8px; border: 1px solid #dfe1e2; border-radius: 6px; background: #fff; width: 100%; box-sizing: border-box; }
    .lab__field input[type="color"] { width: 40px; height: 28px; padding: 2px; border: 1px solid #dfe1e2; border-radius: 6px; background: #fff; cursor: pointer; }
    .lab__field input[type="range"] { width: 100%; }
    .lab__field input[type="checkbox"] { margin: 0; }
    .lab__range-row { display: flex; align-items: center; gap: 8px; }
    .lab__range-row .value { min-width: 38px; text-align: right; font-size: 12px; color: #555; font-variant-numeric: tabular-nums; }
    .lab__palette { display: flex; gap: 6px; flex-wrap: wrap; }
    .lab__palette input[type="color"] { width: 32px; height: 28px; }
    .lab__hint { font-size: 11px; color: #9ca3af; }
    .lab__copy-toast { position: fixed; bottom: 24px; right: 24px; background: #257469; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .lab__copy-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="lab">
    <aside class="lab__nav">
      <div class="lab__nav-title">Chart types</div>
      <div class="lab__nav-item active" data-type="line">
        <span class="material-symbols-rounded">show_chart</span>Line
      </div>
      <div class="lab__nav-item" data-type="bar">
        <span class="material-symbols-rounded">bar_chart</span>Bar
      </div>
      <div class="lab__nav-item" data-type="stackedArea">
        <span class="material-symbols-rounded">area_chart</span>Stacked area
      </div>
      <div class="lab__nav-item" data-type="donut">
        <span class="material-symbols-rounded">donut_large</span>Donut
      </div>
      <div class="lab__nav-item" data-type="sankey">
        <span class="material-symbols-rounded">account_tree</span>Sankey
      </div>
      <div class="lab__nav-item" data-type="heatmap">
        <span class="material-symbols-rounded">grid_on</span>Heatmap
      </div>
      <div class="lab__nav-item" data-type="funnel">
        <span class="material-symbols-rounded">filter_alt</span>Funnel
      </div>
    </aside>

    <main class="lab__main">
      <div class="lab__topbar">
        <h1 id="lab-title">Line chart</h1>
        <div class="lab__topbar-spacer"></div>
        <span class="lab__preset-label">Preset:</span>
        <select id="lab-preset" class="lab__select"></select>
        <button id="lab-reset" class="lab__btn lab__btn--ghost">Reset</button>
        <button id="lab-copy" class="lab__btn">Copy JS config</button>
      </div>
      <div class="lab__preview">
        <div class="lab__chart-card">
          <div id="lab-chart" class="lab__chart-host"></div>
        </div>
      </div>
    </main>

    <aside class="lab__controls" id="lab-controls"></aside>
  </div>
  <div class="lab__copy-toast" id="lab-toast">Copied to clipboard</div>

  <script src="https://cdn.jsdelivr.net/npm/ag-charts-community@13.2.1/dist/umd/ag-charts-community.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ag-charts-enterprise@13.2.1/dist/umd/ag-charts-enterprise.min.js"></script>
  <script src="chart-lab.js"></script>
</body>
</html>
