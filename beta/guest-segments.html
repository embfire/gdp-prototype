<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segments — PAR Guest360 Beta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0..1,0">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../assets/bento.css">
  <link rel="stylesheet" href="beta.css">
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <a href="index.html" class="header-brand" aria-label="Guest360 Home">
          <img src="../assets/par-guest360.svg" alt="PAR Guest360 logo" width="124" height="40">
        </a>
        <span class="header-brand-divider" aria-hidden="true"></span>
        <button class="header-brand-btn" aria-label="Select brand">
          Life Alive
          <i class="ph ph-caret-down"></i>
        </button>
      </div>
      <div class="header-right">
        <button class="header-btn">
          <img src="../assets/ava-assistant.svg" alt="" width="24" height="24">
          Ava
        </button>
        <button class="header-btn">
          <span class="material-symbols-rounded">school</span>
          PAR Academy
        </button>
        <button class="header-btn header-btn--icon" aria-label="Profile">
          <span class="material-symbols-rounded">person</span>
        </button>
      </div>
    </header>

    <div class="app-shell__body">

      <!-- Sidebar -->
      <aside class="sidebar">
        <nav class="sidebar-nav" aria-label="Main navigation">

          <div class="nav-group" data-nav-group-id="top">
            <a href="index.html" class="nav-item">
              <i class="ph-duotone ph-chart-bar" aria-hidden="true"></i>
              <span class="nav-item__label">Dashboard</span>
            </a>
          </div>

          <div class="nav-group" data-nav-group-id="guests">
            <div class="nav-group-title">Guests</div>
            <a href="guest-profiles.html" class="nav-item">
              <i class="ph-duotone ph-user-circle" aria-hidden="true"></i>
              <span class="nav-item__label">Guest profiles</span>
            </a>
            <a href="guest-segments.html" class="nav-item active">
              <i class="ph-duotone ph-users-three" aria-hidden="true"></i>
              <span class="nav-item__label">Segments</span>
            </a>
          </div>

          <div class="nav-group" data-nav-group-id="bottom">
            <a href="settings.html" class="nav-item">
              <i class="ph-duotone ph-gear" aria-hidden="true"></i>
              <span class="nav-item__label">Settings</span>
              <i class="ph-bold ph-caret-right nav-item__chevron" aria-hidden="true"></i>
            </a>
            <button type="button" class="nav-item nav-item-expandable" onclick="toggleCockpit(this)" aria-expanded="false">
              <i class="ph-duotone ph-wrench" aria-hidden="true"></i>
              <span class="nav-item__label">Cockpit</span>
              <i class="ph-bold ph-caret-right nav-item__chevron" aria-hidden="true"></i>
            </button>
            <div class="nav-sub-group" id="cockpit-sub">
              <a href="cockpit-features.html" class="nav-sub-item">Features</a>
              <a href="cockpit-admins.html" class="nav-sub-item">Admins</a>
            </div>
          </div>

        </nav>
      </aside>

      <!-- Main content -->
      <main class="main-content">
        <div class="placeholder-page">
          <span class="material-symbols-rounded placeholder-page__icon">group</span>
          <p class="placeholder-page__title">Segments</p>
          <p class="placeholder-page__desc">This area is not built yet — mock navigation only.</p>
        </div>
      </main>

    </div>
  </div>

  <script>
    function toggleCockpit(btn) {
      const isOpen = btn.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen);
      document.getElementById('cockpit-sub').classList.toggle('open', isOpen);
    }
  </script>
</body>
</html>
